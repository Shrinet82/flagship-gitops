apiVersion: v1
kind: Namespace
metadata:
  name: victim-ns
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: victim-app-code
  namespace: victim-ns
data:
  main.py: |
    import os
    import sys
    from flask import Flask

    if os.environ.get("CRASH_ON_STARTUP") == "true":
        print("Intentional misconfiguration detected! Crashing on startup...")
        sys.exit(1)

    app = Flask(__name__)
    leaked_memory = []

    @app.route("/")
    def hello():
        return "Vulnerable App is running!"

    @app.route("/memory-leak")
    def leak():
        global leaked_memory
        print("Triggering memory leak...")
        # Allocate ~20MB per request
        leaked_memory.append(' ' * 20 * 1024 * 1024)
        return f"Leaked {len(leaked_memory)*20} MB so far!"

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=8080)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
  namespace: victim-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable
  template:
    metadata:
      labels:
        app: vulnerable
    spec:
      containers:
      - name: flask-app
        image: python:3.9-slim
        command: ["sh", "-c", "pip install flask && python /app/main.py"]
        env:
        - name: CRASH_ON_STARTUP
          value: "true"
        resources:
          requests:
            memory: "50Mi"
          limits:
            memory: "100Mi"
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: victim-app-code
