apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-copilot
  labels:
    app: sre-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-copilot
  template:
    metadata:
      labels:
        app: sre-copilot
    spec:
      serviceAccountName: telemetry-access
      nodeSelector:
        role: mlops
      containers:
        - name: copilot
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - "apt-get update && apt-get install -y curl && curl -LO https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl && chmod +x kubectl && mv kubectl /usr/local/bin/ && pip install -r /app/requirements.txt && python /app/agent.py"
          volumeMounts:
            - name: code
              mountPath: /app
          env:
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-ai-secret
                  key: api-key
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://signoz-ingester.signoz.svc.cluster.local:4317"
            - name: AZURE_OPENAI_ENDPOINT
              value: "https://dummy.openai.azure.com/"
      volumes:
        - name: code
          configMap:
            name: sre-copilot-code
