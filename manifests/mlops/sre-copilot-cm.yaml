apiVersion: v1
data:
  agent.py: "import os\nimport time\nimport json\nimport logging\nimport subprocess\nfrom
    opentelemetry import trace\nfrom opentelemetry.sdk.trace import TracerProvider\nfrom
    opentelemetry.sdk.trace.export import BatchSpanProcessor\nfrom opentelemetry.exporter.otlp.proto.grpc.trace_exporter
    import OTLPSpanExporter\nfrom openai import AzureOpenAI\n\n# Setup Logging\nlogging.basicConfig(level=logging.INFO,
    format='%(asctime)s - %(name)s - %(levelname)s - %(message)s')\nlogger = logging.getLogger(\"sre-copilot\")\n\n#
    1. Setup OpenTelemetry Tracing\nendpoint = os.getenv(\"OTEL_EXPORTER_OTLP_ENDPOINT\",
    \"http://localhost:4317\")\nprovider = TracerProvider()\nprocessor = BatchSpanProcessor(OTLPSpanExporter(endpoint=endpoint,
    insecure=True))\nprovider.add_span_processor(processor)\ntrace.set_tracer_provider(provider)\ntracer
    = trace.get_tracer(\"sre-copilot-agent\")\n\n# 2. Azure AI Configuration\nAZURE_ENDPOINT
    = \"https://shashwatpratap94550-3810-resourc.services.ai.azure.com\"\nAZURE_KEY
    = os.getenv(\"AZURE_OPENAI_API_KEY\", \"REDACTED\")\nMODEL_NAME = \"gpt-5-mini\"\n\ndef
    initialize_azure_client():\n    return AzureOpenAI(\n        api_key=AZURE_KEY,\n
    \       api_version=\"2024-02-15-preview\",\n        azure_endpoint=AZURE_ENDPOINT,\n
    \   )\n\ndef scale_deployment(namespace: str, deployment_name: str, replicas:
    int) -> str:\n    \"\"\"\n    Tool function to scale a Kubernetes deployment.\n
    \   \"\"\"\n    logger.info(f\"Executing scaling action: scaling {deployment_name}
    in {namespace} to {replicas} replicas.\")\n    with tracer.start_as_current_span(\"execute_remediation\")
    as span:\n        span.set_attribute(\"k8s.namespace\", namespace)\n        span.set_attribute(\"k8s.deployment\",
    deployment_name)\n        span.set_attribute(\"k8s.replicas\", replicas)\n        \n
    \       try:\n            result = subprocess.run(\n                [\"kubectl\",
    \"scale\", \"deployment\", deployment_name, \"-n\", namespace, f\"--replicas={replicas}\"],\n
    \               capture_output=True, text=True, check=True\n            )\n            logger.info(f\"Scale
    successful: {result.stdout}\")\n            span.set_attribute(\"remediation.status\",
    \"success\")\n            span.add_event(\"\U0001F44D Cluster Normal - Automated
    Scale Up Executed\")\n            return f\"Success: {result.stdout}\"\n        except
    subprocess.CalledProcessError as e:\n            logger.error(f\"Scale failed:
    {e.stderr}\")\n            span.set_attribute(\"remediation.status\", \"failed\")\n
    \           span.record_exception(e)\n            return f\"Error: {e.stderr}\"\n\n#
    Define the tool schema for Azure OpenAI\ntools = [\n    {\n        \"type\": \"function\",\n
    \       \"function\": {\n            \"name\": \"scale_deployment\",\n            \"description\":
    \"Scales a Kubernetes deployment to a specified number of replicas.\",\n            \"parameters\":
    {\n                \"type\": \"object\",\n                \"properties\": {\n
    \                   \"namespace\": {\n                        \"type\": \"string\",\n
    \                       \"description\": \"The Kubernetes namespace\"\n                    },\n
    \                   \"deployment_name\": {\n                        \"type\":
    \"string\",\n                        \"description\": \"The name of the deployment
    to scale\"\n                    },\n                    \"replicas\": {\n                        \"type\":
    \"integer\",\n                        \"description\": \"The target number of
    replicas\"\n                    }\n                },\n                \"required\":
    [\"namespace\", \"deployment_name\", \"replicas\"]\n            }\n        }\n
    \   }\n]\n\ndef query_signoz_mcp() -> str:\n    \"\"\"\n    Connects to the SigNoz
    MCP Server to fetch cluster state or alerts.\n    Polls for inference_latency
    metric specifically for fraud-detection-api.\n    \"\"\"\n    with tracer.start_as_current_span(\"query_signoz_mcp\")
    as span:\n        # Placeholder for actual MCP protocol HTTP/WebSocket call.\n
    \       # Simulating an alert scenario where inference_latency is critically high.\n
    \       logger.info(\"Polling SigNoz MCP for inference_latency alerts...\")\n
    \       \n        # Simulating high latency trigger\n        simulated_mcp_response
    = json.dumps({\n            \"alert\": \"CRITICAL\",\n            \"metric\":
    \"inference_latency\",\n            \"value\": \"1250ms\",\n            \"threshold\":
    \"500ms\",\n            \"deployment\": \"fraud-detection-api\",\n            \"namespace\":
    \"oppe2-app\",\n            \"cause\": \"High traffic load\"\n        })\n        \n
    \       span.set_attribute(\"mcp.response\", simulated_mcp_response)\n        span.add_event(\"MCP
    Poll Completed\", {\"response\": simulated_mcp_response})\n        return simulated_mcp_response\n\ndef
    run_agent_workflow():\n    \"\"\"\n    Main SRE Copilot loop.\n    \"\"\"\n    client
    = initialize_azure_client()\n    \n    mcp_data = query_signoz_mcp()\n    \n    system_prompt
    = (\n        \"You are an elite, autonomous SRE Copilot managing an MLOps pipeline
    on a k3s cluster. \"\n        \"You are given real-time telemetry from SigNoz
    via MCP. If you see high latency due to load, \"\n        \"your duty is to return
    a valid JSON command to scale the deployment. \"\n        \"Use the scale_deployment
    tool to increase replicas (e.g., to 3 or 5) to handle the load.\"\n    )\n    \n
    \   user_prompt = f\"Here is the latest telemetry from SigNoz MCP:\\n{mcp_data}\"\n
    \   \n    with tracer.start_as_current_span(\"azure_llm_reasoning\") as llm_span:\n
    \       logger.info(\"Sending context to Azure AI Foundry for reasoning...\")\n
    \       llm_span.set_attribute(\"llm.prompt\", user_prompt)\n        \n        response
    = client.chat.completions.create(\n            model=MODEL_NAME,\n            messages=[\n
    \               {\"role\": \"system\", \"content\": system_prompt},\n                {\"role\":
    \"user\", \"content\": user_prompt}\n            ],\n            tools=tools,\n
    \           tool_choice=\"auto\"\n        )\n        \n        response_message
    = response.choices[0].message\n        \n        if response_message.tool_calls:\n
    \           for tool_call in response_message.tool_calls:\n                if
    tool_call.function.name == \"scale_deployment\":\n                    llm_span.add_event(\"Decided
    to scale deployment\")\n                    args = json.loads(tool_call.function.arguments)\n
    \                   scale_deployment(\n                        namespace=args.get(\"namespace\"),\n
    \                       deployment_name=args.get(\"deployment_name\"),\n                        replicas=args.get(\"replicas\")\n
    \                   )\n        else:\n            logger.info(\"LLM determined
    no action was necessary.\")\n            llm_span.add_event(\"No remediation required\")\n\ndef
    main_loop():\n    logger.info(\"Starting Intelligent Remediation Loop...\")\n
    \   while True:\n        with tracer.start_as_current_span(\"sre_copilot_loop\"):\n
    \           try:\n                run_agent_workflow()\n            except Exception
    as e:\n                logger.error(f\"Error in SRE Copilot Loop: {e}\")\n        \n
    \       logger.info(\"Sleeping for 30 seconds before next check...\")\n        time.sleep(30)\n\nif
    __name__ == \"__main__\":\n    try:\n        main_loop()\n    except KeyboardInterrupt:\n
    \       logger.info(\"Exiting Copilot...\")\n    finally:\n        provider.force_flush()\n
    \       logger.info(\"Agent execution complete. Traces exported to SigNoz.\")\n"
  requirements.txt: |
    azure-ai-projects
    azure-identity
    azure-core
    opentelemetry-api
    opentelemetry-sdk
    opentelemetry-exporter-otlp
    openai
    mcp
