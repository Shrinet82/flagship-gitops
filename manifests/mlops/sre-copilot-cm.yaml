apiVersion: v1
data:
  agent.py: "import os\nimport sys\nimport json\nimport subprocess\nimport logging\nimport
    requests\nfrom openai import AzureOpenAI\n\nlogging.basicConfig(level=logging.INFO,
    format='%(asctime)s - %(name)s - %(levelname)s - %(message)s')\nlogger = logging.getLogger(\"sre-copilot\")\n\n#
    Tool Definition Registry\ntools_schema = [\n    {\n        \"type\": \"function\",\n
    \       \"function\": {\n            \"name\": \"scale_deployment\",\n            \"description\":
    \"Scales a deployment's replica count up or down horizontally to handle traffic
    spikes.\",\n            \"parameters\": {\n                \"type\": \"object\",\n
    \               \"properties\": {\n                    \"name\": {\"type\": \"string\"},\n
    \                   \"namespace\": {\"type\": \"string\"},\n                    \"replicas\":
    {\"type\": \"integer\"}\n                },\n                \"required\": [\"name\",
    \"namespace\", \"replicas\"]\n            }\n        }\n    },\n    {\n        \"type\":
    \"function\",\n        \"function\": {\n            \"name\": \"patch_pod_limits\",\n
    \           \"description\": \"Increases CPU and memory resource ceilings when
    a pod encounters resource starvation or OOMKilled events.\",\n            \"parameters\":
    {\n                \"type\": \"object\",\n                \"properties\": {\n
    \                   \"name\": {\"type\": \"string\"},\n                    \"namespace\":
    {\"type\": \"string\"},\n                    \"cpu\": {\"type\": \"string\", \"description\":
    \"e.g., '1000m'\"},\n                    \"memory\": {\"type\": \"string\", \"description\":
    \"e.g., '1Gi'\"}\n                },\n                \"required\": [\"name\",
    \"namespace\", \"cpu\", \"memory\"]\n            }\n        }\n    },\n    {\n
    \       \"type\": \"function\",\n        \"function\": {\n            \"name\":
    \"rollback_deployment\",\n            \"description\": \"Rolls back a deployment
    to its previous stable revision if a bad release or corrupted image tag breaks
    the pod status.\",\n            \"parameters\": {\n                \"type\": \"object\",\n
    \               \"properties\": {\n                    \"name\": {\"type\": \"string\"},\n
    \                   \"namespace\": {\"type\": \"string\"}\n                },\n
    \               \"required\": [\"name\", \"namespace\"]\n            }\n        }\n
    \   },\n    {\n        \"type\": \"function\",\n        \"function\": {\n            \"name\":
    \"trigger_retraining\",\n            \"description\": \"Kicks off an automated
    MLflow retraining pipeline when statistical model drift is detected.\",\n            \"parameters\":
    {\n                \"type\": \"object\",\n                \"properties\": {\n
    \                   \"pipeline_webhook_url\": {\"type\": \"string\"}\n                },\n
    \               \"required\": [\"pipeline_webhook_url\"]\n            }\n        }\n
    \   },\n    {\n        \"type\": \"function\",\n        \"function\": {\n            \"name\":
    \"cordon_and_drain\",\n            \"description\": \"Cordon a hardware node and
    gracefully evict pods when disk or memory pressure threatens node stability.\",\n
    \           \"parameters\": {\n                \"type\": \"object\",\n                \"properties\":
    {\n                    \"node_name\": {\"type\": \"string\"}\n                },\n
    \               \"required\": [\"node_name\"]\n            }\n        }\n    }\n]\n\n#
    Core Execution Logic\ndef execute_tool(name, args):\n    logger.info(f\"Invoking
    target tool: {name} with arguments: {args}\")\n    try:\n        if name == \"scale_deployment\":\n
    \           cmd = f\"kubectl scale deployment/{args['name']} --replicas={args['replicas']}
    -n {args['namespace']}\"\n            res = subprocess.run(cmd, shell=True, capture_output=True,
    text=True, check=True)\n            return f\"Scale Success: {res.stdout}\"\n
    \           \n        elif name == \"patch_pod_limits\":\n            patch_data
    = {\"spec\": {\"template\": {\"spec\": {\"containers\": [{\"name\": args['name'],
    \"resources\": {\"limits\": {\"cpu\": args['cpu'], \"memory\": args['memory']},
    \"requests\": {\"cpu\": args['cpu'], \"memory\": args['memory']}}}]}}}}\n            cmd
    = f\"kubectl patch deployment {args['name']} -n {args['namespace']} --type='strategic'
    -p '{json.dumps(patch_data)}'\"\n            res = subprocess.run(cmd, shell=True,
    capture_output=True, text=True, check=True)\n            return f\"Patch Success:
    {res.stdout}\"\n            \n        elif name == \"rollback_deployment\":\n
    \           cmd = f\"kubectl rollout undo deployment/{args['name']} -n {args['namespace']}\"\n
    \           res = subprocess.run(cmd, shell=True, capture_output=True, text=True,
    check=True)\n            return f\"Rollback Success: {res.stdout}\"\n            \n
    \       elif name == \"trigger_retraining\":\n            res = requests.post(args['pipeline_webhook_url'],
    json={\"trigger\": \"automated_drift_remediation\"}, timeout=10)\n            return
    f\"Retraining Pipeline Trigger Status: {res.status_code}\"\n            \n        elif
    name == \"cordon_and_drain\":\n            subprocess.run(f\"kubectl cordon {args['node_name']}\",
    shell=True, check=True)\n            res = subprocess.run(f\"kubectl drain {args['node_name']}
    --ignore-daemonsets --delete-emptydir-data --force\", shell=True, capture_output=True,
    text=True, check=True)\n            return f\"Drain Success: {res.stdout}\"\n
    \           \n    except subprocess.CalledProcessError as e:\n        logger.error(f\"Execution
    failed for tool {name}: {e.stderr}\")\n        return f\"Execution error: {e.stderr}\"\n
    \   except Exception as e:\n        logger.error(f\"Unexpected error in tool execution:
    {str(e)}\")\n        return f\"Error: {str(e)}\"\n\ndef run_agent_workflow(telemetry_context:
    str):\n    logger.info(\"Starting Intelligent Diagnostic & Remediation Loop...\")\n
    \   \n    client = AzureOpenAI(\n        api_key=os.getenv(\"AZURE_OPENAI_API_KEY\"),\n
    \       api_version=\"2024-05-01-preview\",\n        azure_endpoint=os.getenv(\"AZURE_OPENAI_ENDPOINT\")\n
    \   )\n    \n    system_prompt = os.getenv(\"SYSTEM_PROMPT\", \"Default SRE behavior.\")\n
    \   \n    response = client.chat.completions.create(\n        model=\"gpt-5-mini\",\n
    \       messages=[\n            {\"role\": \"system\", \"content\": system_prompt},\n
    \           {\"role\": \"user\", \"content\": f\"Analyze this live SigNoz incident
    data: {telemetry_context}\"}\n        ],\n        tools=tools_schema,\n        tool_choice=\"auto\"\n
    \   )\n    \n    response_message = response.choices[0].message\n    \n    # Check
    for Explicit Phase 2 Interlock Stop (HALT)\n    if response_message.content and
    \"HALT_INSUFFICIENT_TOOLS\" in response_message.content:\n        logger.warning(\"\U0001F6A8
    [PHASE 2 GUARDRAIL BREACHED] - Agent lacks the necessary tools to safely cure
    this incident.\")\n        logger.warning(f\"Reasoning breakdown from LLM: {response_message.content}\")\n
    \       # Placeholder for Slack/PagerDuty notification webhook hook here\n        print(f\"SLACK_ALERT:
    Operational failure detected. Requiring Manual Intervention. Details: {response_message.content}\")\n
    \       return\n        \n    if response_message.tool_calls:\n        for tool_call
    in response_message.tool_calls:\n            name = tool_call.function.name\n
    \           args = json.loads(tool_call.function.arguments)\n            result
    = execute_tool(name, args)\n            logger.info(f\"Action Result: {result}\")\n
    \   else:\n        logger.info(f\"Telemetry evaluated. No remediation action required
    or safe state reached: {response_message.content}\")\n\n\nimport time\n\ndef query_signoz_mcp()
    -> str:\n    logger.info(\"Polling live telemetry for fraud-detection-api anomalies...\")\n
    \   cmd = \"kubectl get pods -l app=fraud-detection-api -n oppe2-app -o json\"\n
    \   try:\n        res = subprocess.run(cmd, shell=True, capture_output=True, text=True,
    check=True)\n        pods = json.loads(res.stdout).get(\"items\", [])\n        for
    pod in pods:\n            statuses = pod.get(\"status\", {}).get(\"containerStatuses\",
    [])\n            for status in statuses:\n                state = status.get(\"state\",
    {})\n                last_state = status.get(\"lastState\", {})\n                \n
    \               is_oom = False\n                if state.get(\"terminated\", {}).get(\"reason\")
    == \"OOMKilled\":\n                    is_oom = True\n                if last_state.get(\"terminated\",
    {}).get(\"reason\") == \"OOMKilled\":\n                    is_oom = True\n                \n
    \               if is_oom:\n                    logger.warning(\"\U0001F6A8 SigNoz
    MCP Alert: OOMKilled detected in live telemetry!\")\n                    return
    json.dumps({\n                        \"incident\": \"OOMKilled\",\n                        \"deployment\":
    \"fraud-detection-api\",\n                        \"namespace\": \"oppe2-app\",\n
    \                       \"error_rate\": \"100%\",\n                        \"description\":
    \"Pod terminated due to memory starvation (OOMKilled). Critical resource exhaustion
    detected.\"\n                    })\n    except Exception as e:\n        logger.error(f\"Error
    polling telemetry: {e}\")\n        \n    return json.dumps({\"status\": \"OK\"})\n\ndef
    main_loop():\n    logger.info(\"Starting Intelligent Remediation Loop...\")\n
    \   while True:\n        try:\n            mcp_data = query_signoz_mcp()\n            if
    '\"status\": \"OK\"' not in mcp_data:\n                run_agent_workflow(mcp_data)\n
    \       except Exception as e:\n            logger.error(f\"Error in SRE Copilot
    Loop: {e}\")\n\n        logger.info(\"Sleeping for 10 seconds before next check...\")\n
    \       time.sleep(10)\n\nif __name__ == \"__main__\":\n    try:\n        main_loop()\n
    \   except KeyboardInterrupt:\n        logger.info(\"Exiting Copilot...\")\n"
kind: ConfigMap
metadata:
  creationTimestamp: null
  name: sre-copilot-script
  namespace: oppe2-app
