apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-api
  namespace: oppe2-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-detection-api
  template:
    metadata:
      labels:
        app: fraud-detection-api
    spec:
      nodeSelector:
        role: mlops
      # Ensure you have a service account with permissions for Cloud Trace
      serviceAccountName: telemetry-access
      containers:
      - name: fraud-api-container
        image: fraud-app:fatal-error
        imagePullPolicy: Always
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://signoz-ingester.signoz.svc.cluster.local:4317"
        ports:
        - containerPort: 8001
        readinessProbe:
          httpGet:
            path: /ready_check
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /live_check
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

