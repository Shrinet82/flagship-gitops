apiVersion: apps/v1
kind: Deployment
metadata:
  name: signoz-mcp-server
  namespace: oppe2-app
  labels:
    app: signoz-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: signoz-mcp-server
  template:
    metadata:
      labels:
        app: signoz-mcp-server
    spec:
      containers:
      - name: signoz-mcp-server
        image: signoz/signoz-mcp-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: SIGNOZ_URL
          value: "http://signoz.signoz.svc.cluster.local:8080"
        - name: TRANSPORT_MODE
          value: "http"
        - name: MCP_SERVER_PORT
          value: "8000"
        - name: SIGNOZ_API_KEY
          valueFrom:
            secretKeyRef:
              name: signoz-api-token
              key: SIGNOZ_API_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: signoz-mcp
  namespace: oppe2-app
spec:
  selector:
    app: signoz-mcp-server
  ports:
  - port: 8000
    targetPort: 8000
