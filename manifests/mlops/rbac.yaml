apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-copilot-cluster-admin
rules:
  - apiGroups: ["", "apps"]
    resources: ["deployments", "deployments/scale", "replicasets", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-copilot-global-binding
subjects:
  - kind: ServiceAccount
    name: telemetry-access
    namespace: oppe2-app
roleRef:
  kind: ClusterRole
  name: sre-copilot-cluster-admin
  apiGroup: rbac.authorization.k8s.io
