apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sre-copilot-role
  namespace: oppe2-app
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-copilot-rolebinding
  namespace: oppe2-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sre-copilot-role
subjects:
- kind: ServiceAccount
  name: telemetry-access
  namespace: oppe2-app
