apiVersion: v1
data:
  app.py: "from fastapi import FastAPI, Request, HTTPException, Response\nfrom fastapi.responses
    import JSONResponse\nfrom pydantic import BaseModel, Field\nimport pandas as pd\nimport
    joblib\nimport logging\nimport time\nimport json\nimport sys\nimport os\nimport
    psutil\n\n# OpenTelemetry imports for tracing\nfrom opentelemetry import trace\nfrom
    opentelemetry.sdk.trace import TracerProvider\nfrom opentelemetry.sdk.trace.export
    import BatchSpanProcessor\nfrom opentelemetry.exporter.otlp.proto.grpc.trace_exporter
    import OTLPSpanExporter\nfrom opentelemetry import metrics\nfrom opentelemetry.sdk.metrics
    import MeterProvider\nfrom opentelemetry.sdk.metrics.export import PeriodicExportingMetricReader\nfrom
    opentelemetry.exporter.otlp.proto.grpc.metric_exporter import OTLPMetricExporter\nfrom
    opentelemetry.instrumentation.fastapi import FastAPIInstrumentor\n\n# --------------------------------------------------------------------------\n#
    1. Custom JSON Formatter for Google Cloud Logging\n# --------------------------------------------------------------------------\nclass
    JsonGCPFormatter(logging.Formatter):\n    \"\"\"\n    A custom formatter to produce
    structured logs in a format\n    that Google Cloud Logging can parse effectively.\n
    \   \"\"\"\n    def format(self, record):\n        log_object = {\n            \"timestamp\":
    self.formatTime(record, self.datefmt),\n            \"severity\": record.levelname,\n
    \           \"message\": record.getMessage(),\n            \"name\": record.name\n
    \       }\n        if isinstance(record.msg, dict):\n            log_object.update(record.msg)\n
    \           if 'message' in record.msg:\n                log_object['message']
    = record.msg['message']\n        if record.exc_info:\n            log_object['exc_info']
    = self.formatException(record.exc_info)\n        return json.dumps(log_object)\n\n#
    --------------------------------------------------------------------------\n#
    2. Setup Logging and Tracing\n# --------------------------------------------------------------------------\n\n#
    Setup Tracer for Google Cloud Trace\ntrace.set_tracer_provider(TracerProvider())\ntracer
    = trace.get_tracer(__name__)\nspan_processor = BatchSpanProcessor(OTLPSpanExporter(endpoint=os.environ.get(\"OTEL_EXPORTER_OTLP_ENDPOINT\",
    \"http://signoz-ingester.signoz.svc.cluster.local:4317\"), insecure=True))\ntrace.get_tracer_provider().add_span_processor(span_processor)\n\n#
    Setup Meter for metrics\nmetric_exporter = OTLPMetricExporter(endpoint=os.environ.get(\"OTEL_EXPORTER_OTLP_ENDPOINT\",
    \"http://signoz-ingester.signoz.svc.cluster.local:4317\"), insecure=True)\nmetric_reader
    = PeriodicExportingMetricReader(metric_exporter)\nmeter_provider = MeterProvider(metric_readers=[metric_reader])\nmetrics.set_meter_provider(meter_provider)\n\n#
    Setup structured logging\nlogger = logging.getLogger(\"fraud-detection-api\")\nlogger.setLevel(logging.INFO)\nhandler
    = logging.StreamHandler(sys.stdout)\nhandler.setFormatter(JsonGCPFormatter())\nlogger.addHandler(handler)\nlogger.propagate
    = False\n\nlogger.info({\"event\": \"application_initializing\", \"status\": \"starting\"})\n\n#
    --------------------------------------------------------------------------\n#
    3. Load Your Trained Model\n# --------------------------------------------------------------------------\n\ntry:\n
    \   # This line specifically loads your trained model from the file.\n    model
    = joblib.load(\"new_model.joblib\")\n    logger.info({\n        \"event\": \"model_load_success\",\n
    \       \"model_path\": \"model.joblib\",\n        \"model_type\": str(type(model))\n
    \   })\nexcept Exception as e:\n    logger.exception({\"event\": \"model_load_failure\",
    \"error\": str(e)})\n    # If the model fails to load, the application cannot
    serve predictions.\n    sys.exit(1)\n\n# Define the human-readable labels for
    the prediction output\nCLASS_LABELS = {0: \"Not Fraud\", 1: \"Fraud\"}\n\n# --------------------------------------------------------------------------\n#
    4. Initialize FastAPI App and Define Data Schemas\n# --------------------------------------------------------------------------\n\napp
    = FastAPI(\n    title=\"\U0001F4B3 Fraud Detection API\",\n    description=\"Predicts
    fraudulent transactions using the trained model.\",\n    version=\"1.0.1\"\n)\n\n#
    Instrument the application to automatically generate HTTP metrics\nFastAPIInstrumentor.instrument_app(app)\n\n#
    This Pydantic 'BaseModel' defines the structure for API *requests*.\n# It is NOT
    a machine learning model. It's used for data validation.\nclass TransactionFeatures(BaseModel):\n
    \   V1: float\n    V2: float\n    V3: float\n    V4: float\n    V5: float\n    V6:
    float\n    V7: float\n    V8: float\n    V9: float\n    V10: float\n    V11: float\n
    \   V12: float\n    V13: float\n    V14: float\n    V15: float\n    V16: float\n
    \   V17: float\n    V18: float\n    V19: float\n    V20: float\n    V21: float\n
    \   V22: float\n    V23: float\n    V24: float\n    V25: float\n    V26: float\n
    \   V27: float\n    V28: float\n    Amount: float\n\n    class Config:\n        #
    Example data for API documentation\n        schema_extra = {\n            \"example\":
    {\n                \"V1\": -1.35, \"V2\": -0.07, \"V3\": 2.53, \"V4\": 1.37, \"V5\":
    -0.33,\n                \"V6\": 0.46, \"V7\": 0.23, \"V8\": 0.09, \"V9\": 0.36,
    \"V10\": 0.09,\n                \"V11\": -0.55, \"V12\": -0.61, \"V13\": -0.99,
    \"V14\": -0.31, \"V15\": 1.46,\n                \"V16\": -0.47, \"V17\": 0.20,
    \"V18\": 0.02, \"V19\": 0.40, \"V20\": 0.25,\n                \"V21\": -0.01,
    \"V22\": 0.27, \"V23\": -0.11, \"V24\": 0.06, \"V25\": 0.12,\n                \"V26\":
    -0.18, \"V27\": 0.13, \"V28\": -0.02, \"Amount\": 149.62\n            }\n        }\n\n#
    This defines the structure for the API *response*.\nclass PredictionResponse(BaseModel):\n
    \   prediction: int\n    predicted_class: str\n    probability: float = None\n\n#
    --------------------------------------------------------------------------\n#
    5. App State, Probes, and Middleware\n# --------------------------------------------------------------------------\n\napp_state
    = {\n    \"is_ready\": False,\n    \"pod_name\": os.getenv(\"HOSTNAME\", \"unknown-pod\"),\n}\n\n@app.on_event(\"startup\")\nasync
    def startup_event():\n    time.sleep(2) # Simulate warm-up\n    app_state[\"is_ready\"]
    = True\n    logger.info({\"event\": \"app_startup_complete\", \"pod_name\": app_state[\"pod_name\"]})\n\n@app.get(\"/live_check\",
    tags=[\"Probes\"])\nasync def liveness_probe():\n    return {\"status\": \"alive\"}\n\n@app.get(\"/ready_check\",
    tags=[\"Probes\"])\nasync def readiness_probe():\n    if app_state[\"is_ready\"]:\n
    \       return {\"status\": \"ready\"}\n    return Response(status_code=503, content=\"Service
    not ready\")\n\n@app.middleware(\"http\")\nasync def log_requests_middleware(request:
    Request, call_next):\n    start_time = time.time()\n    span = trace.get_current_span()\n
    \   trace_id = format(span.get_span_context().trace_id, \"032x\") if span.is_recording()
    else \"N/A\"\n    response = await call_next(request)\n    duration = round((time.time()
    - start_time) * 1000, 2)\n    logger.info({\n        \"event\": \"http_request\",\n
    \       \"trace_id\": trace_id,\n        \"method\": request.method,\n        \"path\":
    request.url.path,\n        \"status_code\": response.status_code,\n        \"duration_ms\":
    duration,\n    })\n    response.headers[\"X-Process-Time-ms\"] = str(duration)\n
    \   return response\n\n# --------------------------------------------------------------------------\n#
    6. API Endpoints\n# --------------------------------------------------------------------------\n\n@app.get(\"/\",
    tags=[\"Root\"])\ndef read_root():\n    return {\"message\": f\"Welcome to the
    Fraud Detection API v{app.version}\"}\n\n@app.post(\"/predict\", response_model=PredictionResponse,
    tags=[\"Prediction\"])\nasync def predict(request_data: TransactionFeatures):\n
    \   \"\"\"\n    Accepts transaction features and returns a fraud prediction\n
    \   using the pre-loaded model.\n    \"\"\"\n    with tracer.start_as_current_span(\"prediction_endpoint\")
    as span:\n        trace_id = format(span.get_span_context().trace_id, \"032x\")\n
    \       try:\n            # Convert the incoming request data into a pandas DataFrame\n
    \           input_df = pd.DataFrame([request_data.dict()])\n\n            # This
    is the core step:\n            # Using your loaded 'model' to make the prediction.\n
    \           prediction_result = model.predict(input_df)\n            prediction_int
    = int(prediction_result[0])\n\n            # Get probability if the model supports
    it\n            confidence = None\n            if hasattr(model, \"predict_proba\"):\n
    \               probs = model.predict_proba(input_df)[0]\n                confidence
    = round(float(probs[prediction_int]), 4)\n\n            # Map the integer prediction
    to its text label\n            predicted_label = CLASS_LABELS.get(prediction_int,
    \"Unknown\")\n\n            logger.info({\n                \"event\": \"prediction_success\",\n
    \               \"trace_id\": trace_id,\n                \"prediction\": predicted_label,\n
    \               \"confidence\": confidence\n            })\n\n            return
    {\n                \"prediction\": prediction_int,\n                \"predicted_class\":
    predicted_label,\n                \"probability\": confidence\n            }\n\n
    \       except Exception as e:\n            logger.exception({\n                \"event\":
    \"prediction_error\",\n                \"trace_id\": trace_id,\n                \"error\":
    str(e)\n            })\n            raise HTTPException(status_code=500, detail=f\"Prediction
    failed: {e}\")\n\n"
kind: ConfigMap
metadata:
  creationTimestamp: null
  name: fraud-app-py
  namespace: oppe2-app
